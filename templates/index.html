<!DOCTYPE html>
<html class="scroll-smooth" lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebDrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #020202;
  --bg-2: #050505;
  --surface: rgba(255,255,255,0.02);
  --border: rgba(255,255,255,0.04);
  --accent: #C8C8C8;
  --accent-glow: rgba(200,200,200,0.12);
  --accent-2: #888888;
  --text: #ffffff;
  --text-muted: rgba(255,255,255,0.5);
  --text-dim: rgba(255,255,255,0.25);
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --ease-cinematic: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.44, 0, 0.56, 1);
}

body {
  font-family: var(--font);
  background-color: var(--bg);
  color: var(--text);
  margin: 0;
  overflow-x: hidden;
  min-height: 100vh;
  selection-color: rgba(99,102,241,0.3);
}

::selection { background: rgba(200,200,200,0.15); color: #fff; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

/* â”€â”€ Spotlight Card â”€â”€ */
.spotlight-card {
  position: relative;
  border-radius: 4px;
  background-color: var(--surface);
  overflow: hidden;
  --mouse-x: 0px;
  --mouse-y: 0px;
}
.spotlight-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(200,200,200,0.2), transparent 40%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 2;
}
.spotlight-card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(225deg, rgba(200,200,200,0.06), rgba(255,255,255,0.01));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 1;
}
.spotlight-card:hover::before { opacity: 1; }

/* â”€â”€ Animations â”€â”€ */
@keyframes animationIn {
  0%   { opacity: 0; transform: translateY(20px); filter: blur(4px); }
  100% { opacity: 1; transform: translateY(0);    filter: blur(0px); }
}
.animate-on-scroll { animation-play-state: paused !important; }
.animate-on-scroll.animate { animation-play-state: running !important; }

@keyframes scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.animate-scroll { animation: scroll 40s linear infinite; }

@keyframes beam-drop {
  0%   { transform: translateY(0); opacity: 0; }
  15%  { opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateY(calc(-100vh - 200px)); opacity: 0; }
}
.beam {
  position: absolute;
  bottom: 0;
  top: auto;
  width: 1px;
  height: 200px;
  background: linear-gradient(to top, transparent, rgba(220,220,220,0.55), transparent);
  animation: beam-drop 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  box-shadow: 0 0 6px rgba(255,255,255,0.15);
}
.beam-delay-1 { animation-delay: 2.3s; }
.beam-delay-2 { animation-delay: 4.7s; }

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes shimmer {
  0%   { transform: translateX(-100%) skewX(-15deg); }
  100% { transform: translateX(200%) skewX(-15deg); }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(200,200,200,0.06); }
  50%       { box-shadow: 0 0 35px rgba(200,200,200,0.14); }
}

@keyframes log-in {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes success-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes progress-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.6; }
}

/* â”€â”€ Layout â”€â”€ */
.wrapper {
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  min-height: 100vh;
  width: 100%;
  max-width: 1440px;
  margin: 0 auto;
  position: relative;
}

/* â”€â”€ Background Grid â”€â”€ */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 12rem 24rem;
  pointer-events: none;
  z-index: 0;
}

/* â”€â”€ Beams â”€â”€ */
.beams {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
  z-index: 0;
  padding: 0 1.5rem;
}
@media (min-width: 768px) { .beams { padding: 0 3rem; } }
@media (min-width: 1024px) { .beams { padding: 0 6rem; } }

.beam-track {
  position: relative;
  width: 1px;
  height: 100%;
  background: rgba(255,255,255,0.015);
  overflow: hidden;
}
.beam-track.center { display: none; }
@media (min-width: 768px) {
  .beam-track.center {
    display: block;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
}

/* â”€â”€ Nav â”€â”€ */
nav {
  position: relative;
  z-index: 50;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
  background: rgba(2,2,2,0.8);
}
.nav-inner {
  display: flex;
  height: 5rem;
  padding: 0 1.5rem;
  align-items: center;
  justify-content: space-between;
}
@media (min-width: 768px) { .nav-inner { padding: 0 3rem; } }
@media (min-width: 1024px) { .nav-inner { padding: 0 6rem; } }

.nav-github-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.45rem 0.65rem 0.45rem 0.55rem;
  border-radius: 10px;
  border: 0.75px solid #424b5b;
  background: linear-gradient(90deg, rgba(1,1,1,0.6) 0%, rgba(1,1,1,0.46) 60%, rgba(1,1,1,0) 100%);
  text-decoration: none;
  transition: border-color 0.3s ease, background 0.3s ease;
  animation: animationIn 0.8s var(--ease-cinematic) 0s both;
}
.nav-github-btn:hover {
  border-color: rgba(100,116,139,0.7);
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 60%, rgba(255,255,255,0) 100%);
}
.nav-github-content {
  display: flex;
  align-items: center;
  gap: 0.65rem;
}
.nav-github-icon {
  width: 28px;
  height: 28px;
  color: rgba(255,255,255,0.85);
  flex-shrink: 0;
}
.nav-github-text {
  display: flex;
  flex-direction: column;
  padding-right: 1rem;
}
.nav-github-text-main {
  font-family: var(--font);
  font-size: 0.72rem;
  font-weight: 400;
  color: #fff;
  line-height: 1.3;
  white-space: nowrap;
}
.nav-github-text-sub {
  font-family: var(--font);
  font-size: 0.72rem;
  font-weight: 400;
  color: #6e7681;
  line-height: 1.3;
  white-space: nowrap;
}
.nav-github-arrow {
  color: rgba(255,255,255,0.35);
  flex-shrink: 0;
}

/* â”€â”€ Dot luminoso â”€â”€ */
.dot-glow {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(220,220,220,0.85);
  box-shadow: 0 0 5px rgba(255,255,255,0.6), 0 0 10px rgba(255,255,255,0.25);
  flex-shrink: 0;
}

/* â”€â”€ Hero â”€â”€ */
.hero {
  position: relative;
  z-index: 10;
  padding: 5rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  min-height: calc(100vh - 5rem);
}
@media (min-width: 768px) { .hero { padding: 6rem 3rem; } }
@media (min-width: 1024px) { .hero { padding: 8rem 6rem; } }

.hero-inner {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* Badge */
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  width: fit-content;
  padding: 0.35rem 0.85rem;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  animation: animationIn 0.8s var(--ease-cinematic) 0.1s both;
}
.hero-tag-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(200,200,200,0.6);
}

/* Title */
.hero-title {
  margin: 0;
  font-size: 2.75rem;
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--text);
  animation: animationIn 0.8s var(--ease-cinematic) 0.2s both;
}
@media (min-width: 768px) { .hero-title { font-size: 3.5rem; } }
.hero-title .accent { color: #D4D4D4; font-weight: 500; }

/* Subtitle */
.hero-sub {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text-muted);
  animation: animationIn 0.8s var(--ease-cinematic) 0.3s both;
}

/* â”€â”€ App Card â”€â”€ */
.app-card {
  animation: animationIn 0.8s var(--ease-cinematic) 0.45s both;
}

/* URL Input */
.input-wrap {
  position: relative;
  margin-bottom: 0.75rem;
}
.input-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
  transition: color 0.3s ease;
  display: flex;
}
.url-input {
  width: 100%;
  padding: 1rem 1rem 1rem 2.75rem;
  background: rgba(2,2,2,0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
}
.url-input::placeholder { color: var(--text-dim); }
.url-input:focus {
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.04), 0 0 20px rgba(255,255,255,0.04);
  background: rgba(255,255,255,0.02);
}
.url-input:focus + .input-icon,
.input-wrap:focus-within .input-icon { color: rgba(255,255,255,0.55); }
.url-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.mode-switch {
  display: inline-flex;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  padding: 0.3rem;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 999px;
  background: rgba(255,255,255,0.02);
}
.mode-tab {
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0.65rem 1rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.mode-tab.active {
  color: #fff;
  background: rgba(255,255,255,0.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}
.mode-tab:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.input-stack {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.batch-wrap {
  display: none;
}
.batch-wrap.active {
  display: block;
}
.batch-input {
  width: 100%;
  min-height: 148px;
  resize: vertical;
  padding: 1rem 1rem 1rem 1.1rem;
  background: rgba(2,2,2,0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.82rem;
  line-height: 1.6;
  outline: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
}
.batch-input::placeholder {
  color: var(--text-dim);
}
.batch-input:focus {
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.04), 0 0 20px rgba(255,255,255,0.04);
  background: rgba(255,255,255,0.02);
}
.batch-help {
  font-size: 0.72rem;
  color: var(--text-dim);
  line-height: 1.6;
}

.repo-option-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
  padding: 0.85rem 1rem;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  background: rgba(255,255,255,0.02);
}
.repo-option {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  font-size: 0.82rem;
  color: rgba(255,255,255,0.72);
}
.repo-option input {
  width: 16px;
  height: 16px;
  accent-color: #d4d4d4;
}
.repo-option strong {
  font-weight: 600;
  color: rgba(255,255,255,0.92);
}
.repo-option-hint {
  font-size: 0.72rem;
  color: var(--text-dim);
  text-align: right;
  line-height: 1.5;
}
@media (max-width: 768px) {
  .repo-option-wrap {
    flex-direction: column;
    align-items: flex-start;
  }
  .repo-option-hint {
    text-align: left;
  }
}

/* Button */
.dl-btn {
  position: relative;
  width: 100%;
  padding: 1rem 1.5rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  color: rgba(255,255,255,0.8);
  font-family: var(--font);
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  overflow: hidden;
  transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s var(--ease-cinematic), color 0.3s ease;
}
.dl-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -60%;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transform: skewX(-15deg);
  transition: none;
}
.dl-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.22);
  box-shadow: 0 0 30px rgba(255,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.08);
  transform: translateY(-1px);
  color: #fff;
}
.dl-btn:hover:not(:disabled)::before {
  animation: shimmer 0.6s ease forwards;
}
.dl-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
}
.dl-btn.loading {
  animation: pulse-glow 2s ease infinite;
}

/* Spinner */
.spinner {
  width: 16px;
  height: 16px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  border-top-color: rgba(255,255,255,0.7);
  animation: spin 0.7s linear infinite;
  display: none;
}

/* Progress bar */
.progress-wrap {
  height: 2px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.5rem;
  display: none;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #444, #C8C8C8);
  border-radius: 2px;
  transition: width 0.4s var(--ease-smooth);
  box-shadow: 0 0 8px rgba(200,200,200,0.2);
  animation: progress-pulse 1.5s ease infinite;
}
.progress-wrap.active { display: block; }

/* Log Terminal */
.log-container {
  margin-top: 1rem;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 6px;
  overflow: hidden;
  display: none;
}
.log-container.active { display: block; }

.log-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  background: rgba(255,255,255,0.02);
}
.log-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.log-dot-r { background: #ff5f57; }
.log-dot-y { background: #febc2e; }
.log-dot-g { background: #28c840; }
.log-label {
  margin-left: auto;
  font-size: 0.6rem;
  font-family: var(--mono);
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.log-body {
  padding: 0.75rem 1rem;
  max-height: 180px;
  overflow-y: auto;
}
.log-body::-webkit-scrollbar { width: 2px; }
.log-body::-webkit-scrollbar-thumb { background: #222; }

.log-entry {
  font-family: var(--mono);
  font-size: 0.75rem;
  line-height: 1.6;
  color: rgba(255,255,255,0.4);
  padding: 2px 0;
  animation: log-in 0.25s var(--ease-cinematic);
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
}
.log-entry::before {
  content: 'â€º';
  color: var(--text-dim);
  flex-shrink: 0;
  margin-top: 1px;
}
.log-entry.success { color: rgba(200,200,200,0.85); }
.log-entry.success::before { color: rgba(200,200,200,0.6); }
.log-entry.error { color: rgba(255,80,80,0.7); }
.log-entry.error::before { content: 'âœ•'; color: rgba(255,80,80,0.5); }

/* Success */
.success-box {
  margin-top: 0.75rem;
  padding: 1rem 1.25rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  display: none;
  animation: success-up 0.4s var(--ease-cinematic);
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.success-box.active { display: flex; }
.success-copy {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.success-text {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.75);
  font-weight: 500;
}
.success-text svg { color: rgba(200,200,200,0.8); }
.success-subtext {
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.success-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.success-link {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-decoration: none;
  padding: 0.35rem 0.75rem;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.success-link:hover {
  border-color: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.8);
}
.success-button {
  background: transparent;
}
.success-button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.batch-results {
  margin-top: 0.75rem;
  padding: 1rem 1.1rem;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  display: none;
}
.batch-results.active {
  display: block;
}
.batch-summary {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  margin-bottom: 1rem;
}
.batch-summary-title {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.84);
  font-weight: 600;
}
.batch-summary-meta {
  font-size: 0.76rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.batch-list {
  display: grid;
  gap: 0.75rem;
}
.batch-item {
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
  background: rgba(0,0,0,0.28);
  padding: 0.9rem 1rem;
}
.batch-item-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.75rem;
}
.batch-item-url {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.8);
  line-height: 1.6;
  word-break: break-word;
}
.batch-item-meta {
  margin-top: 0.35rem;
  font-size: 0.72rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.batch-status {
  flex-shrink: 0;
  border-radius: 999px;
  padding: 0.35rem 0.65rem;
  font-size: 0.68rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.72);
  background: rgba(255,255,255,0.05);
}
.batch-status.complete {
  color: rgba(210,210,210,0.95);
}
.batch-status.error {
  color: rgba(255,120,120,0.88);
  border-color: rgba(255,120,120,0.18);
  background: rgba(255,80,80,0.08);
}
.batch-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
  margin-top: 0.8rem;
}
@media (max-width: 768px) {
  .success-box {
    flex-direction: column;
    align-items: flex-start;
  }
  .success-actions {
    width: 100%;
    justify-content: flex-start;
  }
  .batch-item-top {
    flex-direction: column;
  }
}

/* â”€â”€ Ticker â”€â”€ */
.ticker-section {
  position: relative;
  z-index: 10;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  padding: 1.25rem 0;
  overflow: hidden;
}
.ticker-mask {
  -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
  mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
}
.ticker-inner {
  display: flex;
  width: max-content;
  animation: scroll 35s linear infinite;
}
.ticker-group {
  display: flex;
  align-items: center;
  gap: 4rem;
  padding: 0 2rem;
}
.ticker-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}
.ticker-item svg { color: rgba(255,255,255,0.2); }

/* â”€â”€ Features â”€â”€ */
.features-section {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
@media (min-width: 768px) { .features-section { grid-template-columns: repeat(3, 1fr); } }

.feature-card {
  background: var(--bg);
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 3rem;
  cursor: default;
}
.feature-num {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
.feature-icon {
  width: 2.5rem;
  height: 2.5rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.7);
  transition: transform 0.5s var(--ease-cinematic), border-color 0.3s ease, background 0.3s ease;
}
.feature-card:hover .feature-icon {
  transform: scale(1.1);
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.9);
}
.feature-title {
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--text);
  margin: 0 0 0.5rem;
  letter-spacing: -0.01em;
}
.feature-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.65;
  margin: 0;
}
.feature-header { display: flex; align-items: flex-start; justify-content: space-between; }

/* â”€â”€ Footer â”€â”€ */
footer {
  position: relative;
  z-index: 10;
  border-top: 1px solid var(--border);
  padding: 2rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}
@media (min-width: 768px) { footer { padding: 2rem 3rem; } }
@media (min-width: 1024px) { footer { padding: 2rem 6rem; } }

.footer-brand {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.footer-brand svg { color: rgba(255,255,255,0.25); }
.footer-copy {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: var(--mono);
}
</style>
</head>

<body>

<!-- App Logic -->
<script>
  const repoUploadConfigured = {{ 'true' if repo_upload_enabled else 'false' }};
  const repoUploadRepo = {{ repo_upload_repo|tojson }};
  let currentMode = 'single';
  let currentSessionId = null;
  let currentSessionResult = null;
  let eventSource = null;
  let progressInterval = null;
  let fakeProgress = 0;

  function setMode(mode) {
    currentMode = mode;

    const isBatch = mode === 'batch';
    document.getElementById('singleModeBtn').classList.toggle('active', !isBatch);
    document.getElementById('batchModeBtn').classList.toggle('active', isBatch);
    document.getElementById('singleInputWrap').style.display = isBatch ? 'none' : 'block';
    document.getElementById('batchInputWrap').classList.toggle('active', isBatch);
    document.getElementById('btnText').textContent = isBatch ? 'Processar lote' : 'Fazer download';
  }

  function parseBatchUrls() {
    return document.getElementById('batchUrlsInput').value
      .split(/\r?\n/)
      .map((value) => value.trim())
      .filter(Boolean);
  }

  function startDownload() {
    const isBatch = currentMode === 'batch';
    const uploadToRepo = repoUploadConfigured && document.getElementById('autoUploadCheckbox').checked;
    const payload = isBatch
      ? { urls: parseBatchUrls(), upload_to_repo: uploadToRepo }
      : { url: document.getElementById('urlInput').value.trim(), upload_to_repo: uploadToRepo };
    const endpoint = isBatch ? '/start-batch-download' : '/start-download';

    if (isBatch && payload.urls.length === 0) {
      shakeInput(document.getElementById('batchUrlsInput'));
      return;
    }

    if (!isBatch && !payload.url) {
      shakeInput(document.getElementById('urlInput'));
      return;
    }

    setLoading(true);
    clearLogs();
    hideSuccess();
    hideBatchResults();
    currentSessionResult = null;
    currentSessionId = null;

    fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Falha ao iniciar o processamento');
        }
        return data;
      })
      .then((data) => {
        currentSessionId = data.session_id;
        connectSSE(currentSessionId);
      })
      .catch((err) => {
        addLog('Erro de conexao: ' + err.message, 'error');
        setLoading(false);
      });
  }

  function connectSSE(sessionId) {
    if (eventSource) {
      eventSource.close();
    }

    eventSource = new EventSource('/stream/' + sessionId);
    eventSource.onmessage = (e) => addLog(e.data);
    eventSource.addEventListener('done', (e) => {
      eventSource.close();
      eventSource = null;
      clearInterval(progressInterval);

      if (e.data === 'complete') {
        setProgress(100);
        setTimeout(() => {
          if (currentMode === 'single') {
            triggerDownload(sessionId);
          }
          loadSessionResult(sessionId);
        }, 300);
      } else {
        addLog('Processamento falhou.', 'error');
        loadSessionResult(sessionId);
      }

      setTimeout(resetUI, 1200);
    });

    eventSource.onerror = () => {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      clearInterval(progressInterval);
      setLoading(false);
    };
  }

  function loadSessionResult(sessionId) {
    fetch('/session-result/' + sessionId)
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Falha ao carregar resultado');
        }
        return data;
      })
      .then((result) => {
        currentSessionResult = result;
        if (result.mode === 'batch') {
          hideSuccess();
          showBatchResults(result);
        } else {
          hideBatchResults();
          showSuccess(sessionId, result);
        }
      })
      .catch((err) => addLog('Erro ao carregar resultado: ' + err.message, 'error'));
  }

  function triggerDownload(sessionId) {
    const downloadUrl = '/download-file/' + sessionId;
    const anchor = document.createElement('a');
    anchor.href = downloadUrl;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    document.getElementById('downloadLink').href = downloadUrl;
  }

  function showSuccess(sessionId, result = null) {
    document.getElementById('successMessage').classList.add('active');
    document.getElementById('downloadLink').href = '/download-file/' + sessionId;
    updateRepoUploadState(result);
  }

  function hideSuccess() {
    document.getElementById('successMessage').classList.remove('active');
    document.getElementById('repoUploadStatus').textContent = 'O ZIP esta pronto para baixar.';
    document.getElementById('repoUploadBtn').textContent = 'Enviar ao repositorio';
    document.getElementById('repoUploadBtn').disabled = false;
    document.getElementById('repoFileLink').style.display = 'none';
    document.getElementById('repoFileLink').href = '#';
  }

  function showBatchResults(result) {
    const summary = result.summary || { total: 0, completed: 0, failed: 0 };
    const summaryEl = document.getElementById('batchSummary');
    const listEl = document.getElementById('batchList');

    summaryEl.innerHTML = `
      <div class="batch-summary-title">Lote concluido</div>
      <div class="batch-summary-meta">
        ${summary.total} link(s) processado(s), ${summary.completed} concluido(s), ${summary.failed} com erro.
        ${result.upload_requested ? 'O envio ao GitHub foi tentado para cada item concluido.' : 'Baixe os ZIPs individualmente abaixo.'}
      </div>
    `;

    listEl.innerHTML = '';
    (result.items || []).forEach((item) => {
      listEl.insertAdjacentHTML('beforeend', renderBatchItem(item));
    });

    document.getElementById('batchResults').classList.add('active');
  }

  function hideBatchResults() {
    document.getElementById('batchResults').classList.remove('active');
    document.getElementById('batchSummary').innerHTML = '';
    document.getElementById('batchList').innerHTML = '';
  }

  function renderBatchItem(item) {
    const statusMap = {
      pending: 'Pendente',
      processing: 'Processando',
      complete: 'Concluido',
      error: 'Erro'
    };

    const actions = [];
    if (item.download_url) {
      actions.push(`<a class="success-link" href="${item.download_url}">Baixar ZIP</a>`);
    }

    const uploadMeta = buildBatchUploadMeta(item);
    if (uploadMeta.link) {
      actions.push(`<a class="success-link" href="${uploadMeta.link}" target="_blank" rel="noopener noreferrer">Abrir no GitHub</a>`);
    }

    return `
      <div class="batch-item">
        <div class="batch-item-top">
          <div>
            <div class="batch-item-url">${escapeHtml(item.source_url || '-')}</div>
            <div class="batch-item-meta">
              ${item.filename ? 'Arquivo: ' + escapeHtml(item.filename) + '<br>' : ''}
              ${uploadMeta.text}
              ${item.error ? '<br>Erro: ' + escapeHtml(item.error) : ''}
            </div>
          </div>
          <span class="batch-status ${item.status}">${statusMap[item.status] || item.status}</span>
        </div>
        ${actions.length ? `<div class="batch-actions">${actions.join('')}</div>` : ''}
      </div>
    `;
  }

  function buildBatchUploadMeta(item) {
    const uploadState = item.repo_upload || { status: 'idle' };

    if (!repoUploadConfigured) {
      return { text: 'Upload GitHub indisponivel neste servidor.', link: null };
    }

    if (uploadState.status === 'uploaded') {
      return { text: 'Upload para ' + repoUploadRepo + ' concluido.', link: uploadState.url || null };
    }

    if (uploadState.status === 'error') {
      return { text: 'Upload falhou: ' + escapeHtml(uploadState.error || 'erro desconhecido'), link: null };
    }

    if (uploadState.status === 'unavailable') {
      return { text: 'Upload automatico indisponivel.', link: null };
    }

    if (item.status === 'complete') {
      return { text: 'ZIP pronto para download.', link: null };
    }

    return { text: 'Aguardando processamento.', link: null };
  }

  function updateRepoUploadState(result = null) {
    const statusEl = document.getElementById('repoUploadStatus');
    const uploadBtn = document.getElementById('repoUploadBtn');
    const fileLink = document.getElementById('repoFileLink');

    fileLink.style.display = 'none';
    fileLink.href = '#';

    if (!repoUploadConfigured) {
      statusEl.textContent = 'Download concluido. Para enviar ao ' + repoUploadRepo + ', configure GITHUB_UPLOAD_TOKEN no servidor.';
      uploadBtn.textContent = 'Envio indisponivel';
      uploadBtn.disabled = true;
      return;
    }

    const uploadState = result && result.repo_upload ? result.repo_upload : { status: 'idle' };

    if (uploadState.status === 'uploaded') {
      statusEl.textContent = 'ZIP enviado com sucesso para ' + repoUploadRepo + '.';
      uploadBtn.textContent = 'Enviado';
      uploadBtn.disabled = true;
      if (uploadState.url) {
        fileLink.href = uploadState.url;
        fileLink.style.display = 'inline-flex';
      }
      return;
    }

    if (uploadState.status === 'error') {
      statusEl.textContent = 'O ZIP foi baixado, mas o envio ao repositorio falhou. Voce pode tentar novamente.';
      uploadBtn.textContent = 'Tentar novamente';
      uploadBtn.disabled = false;
      return;
    }

    if (uploadState.status === 'unavailable') {
      statusEl.textContent = 'O envio automatico nao esta disponivel neste servidor.';
      uploadBtn.textContent = 'Envio indisponivel';
      uploadBtn.disabled = true;
      return;
    }

    if (result && result.upload_requested) {
      statusEl.textContent = 'O ZIP foi baixado. Caso o envio automatico nao apareca como concluido, voce pode reenviar manualmente.';
    } else {
      statusEl.textContent = 'O ZIP esta pronto. Se quiser, envie uma copia para ' + repoUploadRepo + '.';
    }

    uploadBtn.textContent = 'Enviar ao repositorio';
    uploadBtn.disabled = false;
  }

  function uploadCurrentZip() {
    const uploadBtn = document.getElementById('repoUploadBtn');
    if (!currentSessionId || !repoUploadConfigured) {
      return;
    }

    uploadBtn.disabled = true;
    uploadBtn.textContent = 'Enviando...';

    fetch('/upload-to-repo/' + currentSessionId, { method: 'POST' })
      .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Falha ao enviar para o GitHub');
        }
        currentSessionResult = { ...(currentSessionResult || {}), repo_upload: data };
        updateRepoUploadState(currentSessionResult);
      })
      .catch((err) => {
        currentSessionResult = {
          ...(currentSessionResult || {}),
          repo_upload: { status: 'error', error: err.message }
        };
        updateRepoUploadState(currentSessionResult);
      });
  }

  function setProgress(val) {
    document.getElementById('progressBar').style.width = val + '%';
  }

  function startFakeProgress() {
    fakeProgress = 0;
    document.getElementById('progressWrap').classList.add('active');
    progressInterval = setInterval(() => {
      if (fakeProgress < 85) {
        fakeProgress += Math.random() * 3;
        setProgress(Math.min(fakeProgress, 85));
      }
    }, 400);
  }

  function setLoading(loading) {
    const btn = document.getElementById('downloadBtn');
    const text = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const icon = document.getElementById('btnIcon');
    const singleInput = document.getElementById('urlInput');
    const batchInput = document.getElementById('batchUrlsInput');
    const autoUploadCheckbox = document.getElementById('autoUploadCheckbox');
    const logContainer = document.getElementById('logContainer');
    const singleModeBtn = document.getElementById('singleModeBtn');
    const batchModeBtn = document.getElementById('batchModeBtn');

    btn.disabled = loading;
    singleInput.disabled = loading;
    batchInput.disabled = loading;
    singleModeBtn.disabled = loading;
    batchModeBtn.disabled = loading;
    autoUploadCheckbox.disabled = loading || !repoUploadConfigured;
    spinner.style.display = loading ? 'block' : 'none';
    icon.style.display = loading ? 'none' : 'block';
    text.textContent = loading ? 'Processando...' : (currentMode === 'batch' ? 'Processar lote' : 'Fazer download');

    if (loading) {
      btn.classList.add('loading');
      logContainer.classList.add('active');
      startFakeProgress();
    } else {
      btn.classList.remove('loading');
    }
  }

  function resetUI() {
    setLoading(false);
    document.getElementById('progressWrap').classList.remove('active');
    setProgress(0);
  }

  function addLog(message, type = '') {
    const body = document.getElementById('logBody');
    const entry = document.createElement('div');
    entry.className = 'log-entry' + (type ? ' ' + type : '');

    if (!type) {
      const normalized = message.toLowerCase();
      if (normalized.includes('concluido') || normalized.includes('complete') || normalized.includes('zip')) {
        entry.classList.add('success');
      } else if (normalized.includes('erro') || normalized.includes('falhou')) {
        entry.classList.add('error');
      }
    }

    entry.textContent = message;
    body.appendChild(entry);
    body.scrollTop = body.scrollHeight;
  }

  function clearLogs() {
    document.getElementById('logBody').innerHTML = '';
  }

  function shakeInput(element) {
    element.style.borderColor = 'rgba(255,80,80,0.4)';
    element.style.animation = 'shake 0.3s ease';
    setTimeout(() => {
      element.style.borderColor = '';
      element.style.animation = '';
    }, 400);
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function syncRepoUploadPreference() {
    const autoUploadCheckbox = document.getElementById('autoUploadCheckbox');
    const repoOptionHint = document.getElementById('repoOptionHint');

    if (!repoUploadConfigured) {
      autoUploadCheckbox.checked = false;
      autoUploadCheckbox.disabled = true;
      repoOptionHint.textContent = 'Configure GITHUB_UPLOAD_TOKEN no servidor para habilitar o envio ao GitHub.';
      return;
    }

    repoOptionHint.textContent = 'Marcado por padrao: ao concluir, o ZIP baixa no navegador e uma copia pode ser enviada para ' + repoUploadRepo + '.';
  }

  document.getElementById('urlInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !document.getElementById('downloadBtn').disabled) {
      startDownload();
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    syncRepoUploadPreference();
    setMode('single');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animate');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });

    document.querySelectorAll('.animate-on-scroll').forEach((el) => observer.observe(el));

    const cards = document.querySelectorAll('.spotlight-card');
    document.addEventListener('mousemove', (e) => {
      cards.forEach((card) => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
        card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
      });
    });
  });
</script>
